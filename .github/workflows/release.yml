name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build & Publish
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Prepare release archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $staging = "staging"
          New-Item -ItemType Directory -Force $staging | Out-Null

          Copy-Item target\release\ln.exe                $staging\
          Copy-Item target\release\win-symlinks.exe      $staging\
          Copy-Item target\release\win-symlinks-broker.exe $staging\
          Copy-Item install.ps1                          $staging\

          $archive = "win-symlinks-${version}-x86_64-windows.zip"
          Compress-Archive -Path "$staging\*" -DestinationPath $archive

          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding utf8 checksums-sha256.txt

          echo "ARCHIVE=$archive"         >> $env:GITHUB_ENV
          echo "VERSION=$version"         >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ env.VERSION }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') || startsWith(github.ref_name, 'v0.') }}
          files: |
            ${{ env.ARCHIVE }}
            checksums-sha256.txt
